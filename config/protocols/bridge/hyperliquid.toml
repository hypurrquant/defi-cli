[protocol]
name = "Hyperliquid Bridge"
slug = "hyperliquid-bridge"
category = "bridge"
interface = "native_bridge"
chain = "hyperevm"
native = true
description = "Hyperliquid native bridge ($4458M TVL)"

[protocol.contracts]
# Hyperliquid uses system addresses for bridging: event address for HyperCore<>HyperEVM transfers
event_address = "0x3333333333333333333333333333333333333333"
# Precompile for reading HyperCore state (positions, balances, etc.)
precompile = "0x0000000000000000000000000000000000000800"
